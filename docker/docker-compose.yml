version: '3.8'

services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  game-server:
    image: sos-game-server:v1
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: ${NODE_ENV}
      PORT: ${PORT}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      REDIS_URL: ${REDIS_URL}
      SPRING_BOOT_URL: ${SPRING_BOOT_URL}
      LOGGER_URL: ${LOGGER_URL}
      CORS_ORIGINS: ${CORS_ORIGINS}
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    image: sos-frontend:v1
    ports:
      - "5173:80"
    depends_on:
      - game-server
    restart: unless-stopped

volumes:
  redis_data:
